name: Draw.io Files Processing

on:
  push:
    paths:
      - 'drawio_files/*.drawio'
  workflow_dispatch:
    inputs:
      specific_file:
        description: 'Specific file to process (leave empty for all files)'
        required: false
        default: ''

jobs:
  process-drawio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies and draw.io
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser wget
          
          # Install DrawIO
          wget -O drawio.deb https://github.com/jgraph/drawio-desktop/releases/download/v20.8.16/drawio-amd64-20.8.16.deb
          sudo dpkg -i drawio.deb || sudo apt-get -f install -y
          rm drawio.deb

      - name: Convert draw.io files to PNG
        run: |
          mkdir -p png_files
          
          for file in drawio_files/*.drawio; do
            if [ -f "$file" ]; then
              echo "Converting $file..."
              PNG_OUTPUT="png_files/$(basename "${file%.drawio}.png")"
              
              xvfb-run -a drawio \
                --no-sandbox \
                --disable-gpu \
                -x \
                -f png \
                -s 2 \
                -o "$PNG_OUTPUT" \
                "$file"
              
              if [ -f "$PNG_OUTPUT" ]; then
                echo "Successfully created $PNG_OUTPUT"
                
                # Add to changelog
                CURRENT_DATE=$(date +"%d.%m.%Y")
                CURRENT_TIME=$(date +"%H:%M:%S")
                FILE_NAME=$(basename "$file" .drawio)
                
                if [ ! -f "png_files/CHANGELOG.csv" ]; then
                  echo "Date,Time,File Name,PNG Output,Commit Hash" > "png_files/CHANGELOG.csv"
                fi
                
                echo "$CURRENT_DATE,$CURRENT_TIME,$FILE_NAME,$(basename "$PNG_OUTPUT"),${{ github.sha }}" >> "png_files/CHANGELOG.csv"
              else
                echo "Failed to create $PNG_OUTPUT"
              fi
            fi
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add png_files/
          git commit -m "Update PNG files and changelog" || echo "No changes to commit"
          git push
