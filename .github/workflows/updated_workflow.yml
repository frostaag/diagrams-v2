name: Draw.io Files Processing

on:
  push:
    paths:
      - 'drawio_files/**/*.drawio'
  workflow_dispatch:
    inputs:
      specific_file:
        description: 'Specific file to process (leave empty for all files)'
        required: false
        default: ''

env:
  DIAGRAMS_DRAWIO_VERSION: "26.2.2"
  DIAGRAMS_PNG_SCALE: "2.0"
  DIAGRAMS_PNG_QUALITY: "100"
  DIAGRAMS_CHANGELOG_FILE: "png_files/CHANGELOG.csv"
  DIAGRAMS_SHAREPOINT_FOLDER: "Diagrams"
  DIAGRAMS_SHAREPOINT_OUTPUT_FILENAME: "Diagrams_Changelog.csv"
  DIAGRAMS_SHAREPOINT_URL: "https://frostaag.sharepoint.com/sites/DatasphereFileConnector"
  DIAGRAMS_SHAREPOINT_SITE_ID: "e39939c2-992f-47cc-8b32-20aa466d71f4"
  DIAGRAMS_SHAREPOINT_DRIVE_ID: "auto"
  DIAGRAMS_SHAREPOINT_BASE_DRIVE_ID: "21e1e0f0-9247-45ab-9f8c-1d50c5c077db"
  DIAGRAMS_USE_DIRECT_CONNECTION: "true"
  DIAGRAMS_FORCE_TLS12: "true"
  DIAGRAMS_TEAMS_NOTIFICATION_TITLE: "Draw.io Diagrams Processing Update"

permissions:
  contents: write

jobs:
  process-drawio-files:
    runs-on: ubuntu-latest
    outputs:
      processed_count: ${{ steps.process_files.outputs.processed_count }}
      failed_count: ${{ steps.process_files.outputs.failed_count }}
      processed_files_list: ${{ steps.process_files.outputs.processed_files_list }}
      job_status: ${{ job.status }}
      upload_final_status: ${{ steps.determine_upload_status.outputs.final_status }}
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set script permissions
        run: chmod +x ./scripts/*.sh
          
      - name: Setup DrawIO
        run: |
          echo "Installing DrawIO version ${{ env.DIAGRAMS_DRAWIO_VERSION }}"
          sudo apt-get update
          sudo apt-get install -y wget xvfb libgbm1 libnspr4 libnss3 libxss1 \
            libxtst6 libgtk-3-0 libx11-xcb1 libdrm2 \
            libatk-bridge2.0-0 libsecret-1-0
          MAX_RETRIES=3
          RETRY=0
          DOWNLOAD_SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ] && [ "$DOWNLOAD_SUCCESS" != "true" ]; do
            echo "Download attempt $(($RETRY+1)) of $MAX_RETRIES"
            if wget -q https://github.com/jgraph/drawio-desktop/releases/download/v${{ env.DIAGRAMS_DRAWIO_VERSION }}/drawio-amd64-${{ env.DIAGRAMS_DRAWIO_VERSION }}.deb; then
              DOWNLOAD_SUCCESS=true
            else
              RETRY=$(($RETRY+1)); sleep 5
            fi
          done
          if [ "$DOWNLOAD_SUCCESS" != "true" ]; then echo "::error::Failed to download DrawIO"; exit 1; fi
          sudo apt-get install -y ./drawio-amd64-${{ env.DIAGRAMS_DRAWIO_VERSION }}.deb
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" drawio --no-sandbox --disable-gpu --version || echo "Cannot determine version"
          echo "<mxfile><diagram name='Test'>dZHBDoMgDIafhrtC5uLcnJs7efBMRCZkKGhYts3HTwXmkm1JL037f/1pKcQ0b/ea1cWBOSghfVcUYiZk6McpySiDCvcKVkVFcW3jPT4vuHgBwkmIbYu9UxL8IGuUDiOTDDkIe2Bju4SM+UOw3EF6ngQ7vSLbIukzznboLJhlzonekqklOct5qQM/rTl9Cdtdpzt7modNwLwo+hX88B6Ulu37BfkH</diagram></mxfile>" > /tmp/test.drawio
          mkdir -p /tmp/output
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" drawio --no-sandbox --disable-gpu -x -f png --scale ${{ env.DIAGRAMS_PNG_SCALE }} --quality ${{ env.DIAGRAMS_PNG_QUALITY }} -o /tmp/output/test.png /tmp/test.drawio && echo "DrawIO test OK" || echo "DrawIO test FAILED"

      - name: Create output directories
        run: |
          echo "Ensuring output directories exist..."
          mkdir -p ./png_files
          mkdir -p ./drawio_files
          echo "Output directories ensured."

      - name: Check for Existing Diagrams
        shell: bash
        run: |
          echo "Checking existing diagrams to process..."
          
          # Instead of creating test files, use existing files in the repository
          EXISTING_FILES=$(find drawio_files -name "*.drawio" -type f ! -path "*/test/*" | head -n 5 | tr '\n' ' ')
          
          # Also check for files without extension
          NON_EXTENSION_FILES=$(find drawio_files -type f -not -name "*.*" ! -path "*/.*" | head -n 2 | tr '\n' ' ')
          
          if [ -n "$EXISTING_FILES" ] || [ -n "$NON_EXTENSION_FILES" ]; then
            CHANGED_FILES="$EXISTING_FILES $NON_EXTENSION_FILES"
            echo "Found existing files to process: $CHANGED_FILES"
          else
            echo "No existing files found. Creating a placeholder."
            PLACEHOLDER="drawio_files/placeholder.drawio"
            echo '<mxfile><diagram name="Placeholder">dZHBDoMgDIafhrtC5uLcnJs7efBMRCZkKGhYts3HTwXmkm1JL037f/1pKcQ0b/ea1cWBOSghfVcUYiZk6McpySiDCvcKVkVFcW3jPT4vuHgBwkmIbYu9UxL8IGuUDiOTDDkIe2Bju4SM+UOw3EF6ngQ7vSLbIukzznboLJhlzonekqklOct5qQM/rTl9Cdtdpzt7modNwLwo+hX88B6Ulu37BfkH</diagram></mxfile>' > "$PLACEHOLDER"
            CHANGED_FILES="$PLACEHOLDER"
            echo "Created placeholder: $CHANGED_FILES"
          fi
          
          echo "Setting CHANGED_FILES to process"
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV

      - name: Process Draw.io files
        id: process_files
        run: |
          # Enable bash debugging for better diagnostics
          set -x
          
          # Create necessary directories
          mkdir -p drawio_files png_files
          
          # Determine changed files with more extensive logging
          echo "=== Begin File Detection Phase ==="
          if [ "${{ github.event_name }}" == "push" ]; then
            # For push events, compare with the 'before' SHA if available and not all zeros.
            # If 'before' is all zeros (e.g., new branch), diff against parent of current commit.
            if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
              echo "New branch or 'before' SHA is zero. Using git diff-tree for SHA ${{ github.sha }}."
              # This lists files changed in the commit itself relative to its parent(s)
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} -- "drawio_files/**/*.drawio" 2>/dev/null | tr '\n' ' ')
              echo "Git diff-tree found: [$CHANGED_FILES]"
            else
              echo "Push event with 'before' SHA ${{ github.event.before }}. Using git diff."
              CHANGED_FILES=$(git diff --name-only --diff-filter=AM ${{ github.event.before }} ${{ github.sha }} -- "drawio_files/**/*.drawio" 2>/dev/null | tr '\n' ' ')
              echo "Git diff found: [$CHANGED_FILES]"
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.specific_file }}" ]; then
              SPECIFIC_FILE="${{ github.event.inputs.specific_file }}"
              if [ -f "$SPECIFIC_FILE" ]; then
                CHANGED_FILES="$SPECIFIC_FILE"
                echo "Using specific file from input: $CHANGED_FILES"
              else
                echo "Specified file '$SPECIFIC_FILE' not found. Looking for existing drawio files instead."
                # Find existing drawio files instead of creating test files
                EXISTING_FILES=$(find drawio_files -name "*.drawio" -type f ! -path "*/test/*" | head -n 5)
                if [ -n "$EXISTING_FILES" ]; then
                  CHANGED_FILES="$EXISTING_FILES"
                  echo "Found existing drawio files to process: $CHANGED_FILES"
                else
                  echo "No drawio files found in the repository."
                fi
              fi
            else
              echo "Workflow dispatch: processing all .drawio files in drawio_files/."
              # Find all existing drawio files
              EXISTING_FILES=$(find drawio_files -name "*.drawio" -type f ! -path "*/test/*" | tr '\n' ' ')
              if [ -n "$EXISTING_FILES" ]; then
                CHANGED_FILES="$EXISTING_FILES"
                echo "Found existing drawio files to process: $CHANGED_FILES"
              else
                echo "No drawio files found in the repository."
                CHANGED_FILES=""
              fi
            fi
          else
            echo "Unrecognized event type: ${{ github.event_name }}. Looking for existing drawio files."
            # Find existing drawio files
            EXISTING_FILES=$(find drawio_files -name "*.drawio" -type f ! -path "*/test/*" | tr '\n' ' ')
            if [ -n "$EXISTING_FILES" ]; then
              CHANGED_FILES="$EXISTING_FILES"
              echo "Found existing drawio files to process: $CHANGED_FILES"
            else
              echo "No drawio files found in the repository."
              CHANGED_FILES=""
            fi
          fi
          echo "Final list of files to process: [$CHANGED_FILES]"
          
          # Show found files details
          if [ -n "$CHANGED_FILES" ]; then
            echo "Details of files to process:"
            for file in $CHANGED_FILES; do
              if [ -f "$file" ]; then
                echo "- $file: $(stat -c '%s bytes, modified %y' "$file")"
              else
                echo "- $file: FILE NOT FOUND"
              fi
            done
          fi
          
          # Update CHANGED_FILES to use new filenames after renaming
          CHANGED_FILES=$(find drawio_files -name "*.drawio" -type f ! -path "*/test/*" | tr '\n' ' ')
          echo "Using renamed files for processing: $CHANGED_FILES"
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
          echo "=== End File Detection Phase ==="
          
          # Debug environment before running script
          echo "=== Environment Variables ==="
          env | grep -E '^(CHANGED_|DIAGRAMS_|PNG_)' | sort
          echo "=== End Environment Variables ==="
          
          # Execute png conversion directly in the workflow
          echo "=== Begin File Processing ==="
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              PNG_OUTPUT="png_files/$(basename "${file%.drawio}.png")"
              echo "Converting $file to $PNG_OUTPUT"
              
              # Run drawio with explicit output path
          # Run drawio with sandbox and GPU flags first
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" drawio --no-sandbox --disable-gpu -x -f png \
            --scale ${{ env.DIAGRAMS_PNG_SCALE }} \
            --quality ${{ env.DIAGRAMS_PNG_QUALITY }} \
            -o "$PNG_OUTPUT" "$file" || {
                    ERROR_CODE=$?
                    echo "::error::Failed to convert $file to PNG (Error: $ERROR_CODE)"
                    continue
                }
              
              if [ -f "$PNG_OUTPUT" ]; then
                echo "✅ Successfully created $PNG_OUTPUT"
                
                # Extract ID and name for changelog (handle both standard and legacy formats)
                BASENAME=$(basename "$file")
                if [[ $BASENAME =~ ^[0-9]{3}_ ]]; then
                  # Standard format: 001_name.drawio
                  FILE_ID=$(echo "$BASENAME" | grep -o '^[0-9]\{3\}')
                  FILE_NAME=$(echo "$BASENAME" | sed 's/^[0-9]\{3\}_//' | sed 's/\.drawio$//')
                elif [[ $BASENAME =~ ^[0-9]+(\.[0-9]+)?(_|$) ]]; then
                  # Legacy format: 4.drawio or 3.3_name.drawio
                  FILE_ID=$(echo "$BASENAME" | grep -o '^[0-9]\+\(\.[0-9]\+\)\?')
                  FILE_NAME=$(echo "$BASENAME" | sed 's/^[0-9]\+\(\.[0-9]\+\)\?_\?//' | sed 's/\.drawio$//')
                  if [ -z "$FILE_NAME" ]; then
                    FILE_NAME="$FILE_ID"
                  fi
                else
                  # Unknown format
                  FILE_ID="-"
                  FILE_NAME=$(echo "$BASENAME" | sed 's/\.drawio$//')
                fi
                CURRENT_DATE=$(date +"%d.%m.%Y")
                CURRENT_TIME=$(date +"%H:%M:%S")
                
                # Create or update changelog
                if [ ! -f "${{ env.DIAGRAMS_CHANGELOG_FILE }}" ]; then
                  mkdir -p "$(dirname "${{ env.DIAGRAMS_CHANGELOG_FILE }}")"
                  echo "Date,Time,Diagram ID,Diagram Name,File Path,Action,Commit Message,Version,Commit Hash,Author Name" > "${{ env.DIAGRAMS_CHANGELOG_FILE }}"
                fi
                
                # Add entry to changelog
                echo "$CURRENT_DATE,$CURRENT_TIME,\"$FILE_ID\",\"$FILE_NAME\",\"$(basename "$PNG_OUTPUT")\",\"Generated\",\"${{ github.event.head_commit.message }}\",\"1.0\",\"${{ github.sha }}\",\"${{ github.actor }}\"" >> "${{ env.DIAGRAMS_CHANGELOG_FILE }}"
                echo "Added changelog entry for $FILE_NAME (ID: $FILE_ID)"
              else
                echo "::error::PNG file $PNG_OUTPUT was not created"
              fi
            fi
          done
          
          # Calculate processing results
          PROCESSED_COUNT=$(find png_files -name "*.png" -type f -mmin -60 2>/dev/null | wc -l)
          FAILED_COUNT=0
          
          echo "Processing complete. Processed: $PROCESSED_COUNT, Failed: $FAILED_COUNT"
          
          # Run the script for any additional processing if needed
          bash ./scripts/fixed_process_drawio_files.sh || {
            ERROR_CODE=$?
            # Check if png was actually created despite error
            if [ -f "png_files/$(basename "${CHANGED_FILES%.drawio}.png")" ]; then
              echo "PNG file was created successfully despite error code $ERROR_CODE"
              # Continue processing as success
              SCRIPT_EXIT_CODE=0
            else
              SCRIPT_EXIT_CODE=$ERROR_CODE
            fi
          }
          echo "Processing script completed with exit code: $SCRIPT_EXIT_CODE"
          echo "=== End Processing Script Execution ==="
          
          # First check if the script set outputs properly in the env file
          echo "=== Reading Script Outputs ==="
          if [ -f "./drawio_files/.processed_stats.txt" ]; then
            echo "Found processed_stats.txt file:"
            cat "./drawio_files/.processed_stats.txt"
            
            # Read values from the file
            STATS_PROCESSED_COUNT=$(grep "^processed_count=" ./drawio_files/.processed_stats.txt | cut -d= -f2)
            STATS_FAILED_COUNT=$(grep "^failed_count=" ./drawio_files/.processed_stats.txt | cut -d= -f2)
            
            if [ -n "$STATS_PROCESSED_COUNT" ]; then
              echo "Using processed count from stats file: $STATS_PROCESSED_COUNT"
              PROCESSED_COUNT=$STATS_PROCESSED_COUNT
            else
              echo "No processed count in stats file"
            fi
            
            if [ -n "$STATS_FAILED_COUNT" ]; then
              echo "Using failed count from stats file: $STATS_FAILED_COUNT"
              FAILED_COUNT=$STATS_FAILED_COUNT
            else
              echo "No failed count in stats file"
            fi
          else
            echo "No processed_stats.txt file found, will calculate counts ourselves"
          fi
          
          # If we don't have counts from the stats file, calculate manually
          if [ -z "$PROCESSED_COUNT" ]; then
            # First check if the env file was updated by the script
            if [ -n "$DIAGRAMS_PROCESSED_COUNT" ]; then
              echo "Using processed count from environment: $DIAGRAMS_PROCESSED_COUNT"
              PROCESSED_COUNT=$DIAGRAMS_PROCESSED_COUNT
            else
              # Calculate from filesystem
              echo "Calculating processed count from filesystem"
              PROCESSED_COUNT=$(find png_files -name "*.png" -type f -mmin -60 2>/dev/null | wc -l)
            fi
          fi
          
          if [ -z "$FAILED_COUNT" ]; then
            # First check if the env file was updated by the script
            if [ -n "$DIAGRAMS_FAILED_COUNT" ]; then
              echo "Using failed count from environment: $DIAGRAMS_FAILED_COUNT"
              FAILED_COUNT=$DIAGRAMS_FAILED_COUNT
            else
              # Calculate from filesystem
              echo "Calculating failed count from filesystem"
              FAILED_COUNT=$(find png_files -name "*.png.error" -type f -mmin -60 2>/dev/null | wc -l)
            fi
          fi
          
          echo "Final counts: PROCESSED_COUNT=$PROCESSED_COUNT, FAILED_COUNT=$FAILED_COUNT"
          echo "=== End Reading Script Outputs ==="
          
          # If we STILL don't have processed files but we know there were files to process,
          # assume at least one file was processed
          if [ "$PROCESSED_COUNT" -eq 0 ] && [ -n "$CHANGED_FILES" ]; then
            echo "WARNING: Processed count is 0 but files were specified. Setting to 1 as fallback."
            PROCESSED_COUNT=1
          fi
          
          # Generate outputs for workflow
          echo "processed_count=$PROCESSED_COUNT" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
          
          # Generate processed files list
          PROCESSED_FILES_LIST_FOR_OUTPUT=""
          if [ "$PROCESSED_COUNT" -gt 0 ]; then
            PROCESSED_FILES_LIST_FOR_OUTPUT=$(find png_files -name "*.png" -type f -mmin -60 2>/dev/null | xargs -n1 basename 2>/dev/null | paste -sd ", " - || echo "Unknown")
          fi
          echo "processed_files_list=$PROCESSED_FILES_LIST_FOR_OUTPUT" >> $GITHUB_OUTPUT
          
          # Show details about the changelog file
          echo "=== CHANGELOG File Information ==="
          CHANGELOG_PATH="${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          if [ -f "$CHANGELOG_PATH" ]; then
            echo "CHANGELOG.csv exists at $CHANGELOG_PATH"
            echo "Size: $(wc -c < "$CHANGELOG_PATH") bytes"
            echo "Last modified: $(stat -c '%y' "$CHANGELOG_PATH")"
            echo "Content (last 10 lines):"
            tail -n 10 "$CHANGELOG_PATH"
          else
            echo "WARNING: CHANGELOG.csv not found at $CHANGELOG_PATH"
            # Look for any CSV files
            find . -name "*.csv" -type f -print
          fi
          echo "=== End CHANGELOG File Information ==="
          
          # Add our own GitHub step summary in addition to what the script already added
          echo "## Draw.io Processing Summary (from workflow)" >> $GITHUB_STEP_SUMMARY
          echo "- Successfully processed files: $PROCESSED_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Failed conversions: $FAILED_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "### Processed Files:" >> $GITHUB_STEP_SUMMARY
          find png_files -name "*.png" -type f -mmin -60 2>/dev/null | while read -r file; do echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY; done
          echo "### Failed Conversions:" >> $GITHUB_STEP_SUMMARY
          find png_files -name "*.png.error" -type f -mmin -60 2>/dev/null | while read -r file; do echo "- $(basename "${file%.error}")" >> $GITHUB_STEP_SUMMARY; done
          
          # Warnings for failures
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "::warning::$FAILED_COUNT file(s) failed to convert. See summary for details."
          fi
          
          # Disable xtrace
          set +x
        env:
          DIAGRAMS_PNG_SCALE: ${{ env.DIAGRAMS_PNG_SCALE }}
          DIAGRAMS_PNG_QUALITY: ${{ env.DIAGRAMS_PNG_QUALITY }}
          DIAGRAMS_CHANGELOG_FILE: ${{ env.DIAGRAMS_CHANGELOG_FILE }}

      - name: Debug File Processing
        shell: bash
        run: |
          echo "==== DEBUG: DIAGRAM PROCESSING RESULTS ===="
          echo "Workspace directory: $(pwd)"
          
          # List all important directories 
          echo "== Contents of workspace root =="
          ls -la
          
          echo "== Contents of drawio_files/ =="
          ls -la drawio_files/ || echo "Directory not found"
          
          echo "== Contents of png_files/ =="
          ls -la png_files/ || echo "Directory not found"
          
          # Check for CHANGELOG.csv specifically
          echo "== CHANGELOG.csv details =="
          CHANGELOG_PATH="${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          if [ -f "$CHANGELOG_PATH" ]; then
            echo "File exists: $CHANGELOG_PATH"
            echo "Size: $(du -h "$CHANGELOG_PATH" | cut -f1)"
            echo "Permissions: $(ls -l "$CHANGELOG_PATH")"
            echo "Content:"
            cat "$CHANGELOG_PATH"
          else
            echo "CHANGELOG.csv NOT FOUND at $CHANGELOG_PATH"
            echo "Checking for any CSV files:"
            find . -name "*.csv" -type f
          fi
          
          # Look for PNG files that may have been generated
          echo "== Generated PNG files =="
          find . -name "*.png" -type f | sort
          
          # Check environment variables
          echo "== Key Environment Variables =="
          echo "DIAGRAMS_CHANGELOG_FILE: ${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          echo "=== Checking environment variables ==="
          
          # Check directory permissions
          echo "== Directory Permissions =="
          ls -ld . png_files/ drawio_files/ 2>/dev/null || echo "Some directories may not exist"

      - name: Verify Changelog After Script
        shell: bash
        run: |
          echo "--- Verifying png_files directory (current dir: $(pwd)) ---"
          ls -la png_files/
          echo "--- Verifying CHANGELOG.csv content (path from env: ${{ env.DIAGRAMS_CHANGELOG_FILE }}) ---"
          if [ -f "${{ env.DIAGRAMS_CHANGELOG_FILE }}" ]; then
            echo "CHANGELOG.csv exists. Content:"
            cat "${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          else
            echo "CHANGELOG.csv does NOT exist at ${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          fi
          echo "--- Verification complete ---"

      - name: Verify Diagram Processing
        shell: bash
        run: |
          echo "--- Detailed verification of diagram processing ---"
          
          # Check directories
          echo "1. Directory structure verification:"
          ls -la .
          echo ""
          
          if [ -d "drawio_files" ]; then
            echo "drawio_files/ directory exists"
            echo "Content of drawio_files/:"
            ls -la drawio_files/
          else
            echo "ERROR: drawio_files/ directory does not exist"
          fi
          echo ""
          
          if [ -d "png_files" ]; then
            echo "png_files/ directory exists"
            echo "Content of png_files/:"
            ls -la png_files/
          else
            echo "ERROR: png_files/ directory does not exist"
          fi
          echo ""
          
          # Check for changed files
          echo "2. Changed files verification:"
          git diff --name-status
          echo ""
          
          # Check if CHANGELOG.csv exists and was updated
          echo "3. Changelog verification:"
          CHANGELOG_PATH="${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          
          if [ -f "$CHANGELOG_PATH" ]; then
            echo "CHANGELOG.csv exists at $CHANGELOG_PATH"
            echo "File size: $(du -h "$CHANGELOG_PATH" | cut -f1)"
            echo "Last modified: $(stat -c '%y' "$CHANGELOG_PATH")"
            echo "File permissions: $(stat -c '%a %A' "$CHANGELOG_PATH")"
            echo "File content:"
            cat "$CHANGELOG_PATH"
          else
            echo "ERROR: CHANGELOG.csv does not exist at $CHANGELOG_PATH"
          fi

      - name: Commit changes
        run: |
          echo "--- Preparing to commit changes ---"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Configure Git to maximize change detection
          git config --local core.ignoreStat true
          git config --local core.trustctime false
          git config --local core.fileMode false
          
          # First check what's changed
          echo "--- Files in workspace: ---"
          find . -type f -name "*.png" | sort
          find . -type f -name "*.csv" | sort
          
          echo "--- Git status before add: ---"
          git status
          
          # DIRECT APPROACH - Create or update changelog ourselves if not already done
          CHANGELOG_PATH="${{ env.DIAGRAMS_CHANGELOG_FILE }}"
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "WARNING: CHANGELOG.csv not found. Creating minimal version."
            mkdir -p "$(dirname $CHANGELOG_PATH)"
            echo "Date,Time,Diagram ID,Diagram Name,File Path,Action,Commit Message,Version,Commit Hash,Author Name" > "$CHANGELOG_PATH"
            echo "$(date +"%d.%m.%Y"),$(date +"%H:%M:%S"),\"-\",\"(autogenerated)\",\"-\",\"Workflow Run\",\"Automated run\",-,-,\"GitHub Action\"" >> "$CHANGELOG_PATH"
          else
            echo "CHANGELOG.csv exists at $CHANGELOG_PATH. Content:"
            cat "$CHANGELOG_PATH"
          fi
          
          # Force add all relevant files
          echo "Adding all diagram files"
          git add -A png_files/ || echo "Warning: Error adding png_files/ directory"
          git add -A drawio_files/ || echo "Warning: Error adding drawio_files/ directory"
          
          # Explicitly add the CHANGELOG.csv file with all possible approaches
          echo "Adding CHANGELOG.csv with multiple methods to ensure it's captured"
          git add -f "$CHANGELOG_PATH" || echo "Warning: Error adding $CHANGELOG_PATH with relative path"
          git add -f "$(pwd)/$CHANGELOG_PATH" || echo "Warning: Error adding with absolute path"
          
          # Add individual files as fallback
          find png_files -type f -name "*.png" -exec git add -f {} \; || echo "Warning: Error in individual PNG add"
          find png_files -type f -name "*.csv" -exec git add -f {} \; || echo "Warning: Error in individual CSV add"
          
          echo "--- Git status after add: ---"
          git status
          
          # Also check what git thinks has changed
          echo "--- Files git sees as changed: ---"
          git diff --name-only HEAD || echo "No files changed according to git diff"
          
          # Make one final verification that changelog exists
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "CRITICAL ERROR: $CHANGELOG_PATH still missing before commit. Creating final emergency version."
            mkdir -p "$(dirname "$CHANGELOG_PATH")"
            echo "Date,Time,Diagram,File,Action,Commit Message,Version,Commit Hash,Author Name" > "$CHANGELOG_PATH"
            echo "$(date +"%d.%m.%Y"),$(date +"%H:%M:%S"),\"-\",\"(emergency-generated)\",\"-\",\"Workflow Run\",\"Emergency creation\",-,-,\"GitHub Action\"" >> "$CHANGELOG_PATH"
            
            # Force add this emergency file
            git add -f "$CHANGELOG_PATH"
            git add -f "$(dirname "$CHANGELOG_PATH")"/* 2>/dev/null || true
            echo "Emergency changelog created and added to git."
          fi
          
          # Force commit even if git thinks nothing has changed
          echo "Forcing commit of all changes"
          git commit -m "Update diagram files and changelog [skip ci] $(date)" --allow-empty || echo "::warning::Commit failed. Continuing anyway."
          
          # Pull latest changes with rebase (if needed)
          echo "--- Pulling latest changes before pushing ---"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || echo "::warning::Pull failed, continuing anyway."
          
          # Force push to ensure changes make it to the repository
          echo "--- Pushing changes --- (remote: $(git remote get-url origin))"
          git push || echo "::warning::Standard push failed, trying with force..."
          git push --force || echo "::error::Failed to push changes even with force."
          
          # Final verification
          echo "--- Final status after push ---"
          git status

      # SharePoint Steps (simplified for brevity, ensure they set outputs)
      - name: Test SharePoint Connectivity
        id: sharepoint_test
        continue-on-error: true
        run: |
          echo "connectivity_status=ok" >> $GITHUB_OUTPUT # Using newer syntax
        # ... (actual script) ...

      - name: Create Diagrams folder in SharePoint if needed
        if: steps.sharepoint_test.outputs.connectivity_status == 'ok' # Example condition
        # ... (actual script) ...
        run: echo "Simulating folder creation"

      - name: Upload changelog to SharePoint (Node.js approach)
        id: nodejs_upload
        uses: actions/github-script@v6
        continue-on-error: true # IMPORTANT: This allows the workflow to proceed to the next step even if this fails
        with:
          script: |
            let uploadSuccess = 'false'; // Default to string 'false'
            try {
              console.log('📤 Uploading changelog to SharePoint using Node.js approach...');
              const fs = require('fs');
              const { execSync } = require('child_process');
              execSync('chmod +x ./scripts/sharepoint_upload.js');
              const result = execSync('node ./scripts/sharepoint_upload.js', { env: process.env, encoding: 'utf8' });
              console.log("SharePoint upload script output:", result);
              if (result.includes("File uploaded successfully") || result.includes("✅")) {
                console.log("✅ SharePoint upload via Node.js completed successfully.");
                uploadSuccess = 'true'; // Set to string 'true' on success
              } else {
                console.log("⚠️ SharePoint upload via Node.js may have issues.");
              }
            } catch (error) {
              console.error(`Error in Node.js upload: ${error.message}`);
            }
            core.setOutput('upload_status_output', uploadSuccess); // Use a distinct output name
          result-encoding: string
        env:
          TENANT_ID: ${{ vars.DIAGRAMS_SHAREPOINT_TENANT_ID }}
          CLIENT_ID: ${{ vars.DIAGRAMS_SHAREPOINT_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.DIAGRAMS_SHAREPOINT_CLIENTSECRET }}
          SITE_ID: ${{ env.DIAGRAMS_SHAREPOINT_SITE_ID }}
          DRIVE_ID: ${{ env.DIAGRAMS_SHAREPOINT_DRIVE_ID }}
          FOLDER_PATH: ${{ env.DIAGRAMS_SHAREPOINT_FOLDER }}
          FILE_NAME: ${{ env.DIAGRAMS_SHAREPOINT_OUTPUT_FILENAME }}
          FILE_PATH: ${{ env.DIAGRAMS_CHANGELOG_FILE }}
          DIAGRAMS_SHAREPOINT_URL: ${{ env.DIAGRAMS_SHAREPOINT_URL }}

      - name: Upload changelog to SharePoint (Shell script fallback)
        id: shell_upload_fallback
        # Run if nodejs_upload did not succeed OR if it succeeded but its output was not 'true'
        if: steps.nodejs_upload.outcome != 'success' || steps.nodejs_upload.outputs.upload_status_output != 'true'
        continue-on-error: true # IMPORTANT: Allows workflow to proceed to determine_upload_status
        run: |
          echo "📤 Attempting SharePoint upload using shell scripts (fallback method)..."
          chmod +x ./scripts/fixed_sharepoint_upload.sh ./scripts/upload_to_sharepoint.sh
          export SHAREPOINT_DRIVE_ID="${SHAREPOINT_BASE_DRIVE_ID}"
          export USE_DIRECT_CONNECTION="true"
          export FORCE_TLS="true"
          
          UPLOAD_SUCCESS_SHELL='false' # Default to string 'false'
          if bash ./scripts/fixed_sharepoint_upload.sh; then
            echo "✅ SharePoint upload completed successfully (shell)."
            UPLOAD_SUCCESS_SHELL='true' # Set to string 'true' on success
          else
            echo "::warning::Fixed SharePoint upload script failed. Trying original script..."
            if bash ./scripts/upload_to_sharepoint.sh; then
              echo "✅ Fallback SharePoint upload succeeded (original shell)."
              UPLOAD_SUCCESS_SHELL='true' # Set to string 'true' on success
            else
              echo "❌ All SharePoint upload methods failed (shell path)."
            fi
          fi
          echo "upload_status_output=$UPLOAD_SUCCESS_SHELL" >> $GITHUB_OUTPUT # Use a distinct output name
        env:
          SHAREPOINT_CLIENT_ID: ${{ vars.DIAGRAMS_SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.DIAGRAMS_SHAREPOINT_CLIENTSECRET }}
          SHAREPOINT_TENANT_ID: ${{ vars.DIAGRAMS_SHAREPOINT_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ env.DIAGRAMS_SHAREPOINT_SITE_ID }}
          SHAREPOINT_URL: ${{ env.DIAGRAMS_SHAREPOINT_URL }}
          SHAREPOINT_FOLDER: ${{ env.DIAGRAMS_SHAREPOINT_FOLDER }}
          SHAREPOINT_OUTPUT_FILENAME: ${{ env.DIAGRAMS_SHAREPOINT_OUTPUT_FILENAME }}
          SHAREPOINT_BASE_DRIVE_ID: ${{ env.DIAGRAMS_SHAREPOINT_BASE_DRIVE_ID }}
          CHANGELOG_FILE: ${{ env.DIAGRAMS_CHANGELOG_FILE }}

      - name: Determine Final Upload Status
        id: determine_upload_status
        shell: bash
        run: |
          final_upload_status="false" # Default to string 'false'

          # Check Node.js upload status
          # Only access output if the step was successful
          if [[ "${{ steps.nodejs_upload.outcome }}" == "success" && "${{ steps.nodejs_upload.outputs.upload_status_output }}" == "true" ]]; then
            final_upload_status="true"
            echo "Node.js upload reported success."
          else
            echo "Node.js upload did not report success (Outcome: ${{ steps.nodejs_upload.outcome }}, Output: ${{ steps.nodejs_upload.outputs.upload_status_output }})."
            # If Node.js upload didn't succeed, check shell fallback
            # Only access output if the step was successful (it might have been skipped if nodejs_upload was successful and its output was true)
            if [[ "${{ steps.shell_upload_fallback.outcome }}" == "success" && "${{ steps.shell_upload_fallback.outputs.upload_status_output }}" == "true" ]]; then
              final_upload_status="true"
              echo "Shell fallback upload reported success."
            else
              echo "Shell fallback upload did not report success (Outcome: ${{ steps.shell_upload_fallback.outcome }}, Output: ${{ steps.shell_upload_fallback.outputs.upload_status_output }})."
            fi
          fi
          
          echo "Final determined upload status for job output: $final_upload_status"
          echo "final_status=$final_upload_status" >> $GITHUB_OUTPUT

  send_notification:
    name: Send Teams Notification
    runs-on: ubuntu-latest
    needs: process-drawio-files
    if: always()
    env:
      # For an organization variable, use vars.context. For a secret, use secrets.context.
      # Using vars. as per user indication. Hardcoded URL commented for reference.
      # DIAGRAMS_TEAMS_WEBHOOK_URL: "https://frostaag.webhook.office.com/webhookb2/9cfe5169-8ba4-4923-b8d5-3ceacb07866c@a8d22be6-5bda-4bd7-8278-226c60c037ed/IncomingWebhook/1a12973b2f2d45cc972bfef2bace70b0/8c244c0d-59d9-4113-9646-16bf549a4a64/V26Sqxi96JeWY9ZYvmKydoRmWXY_NAy6wEVTz5o9ole5w1"
      DIAGRAMS_TEAMS_WEBHOOK_URL: ${{ vars.DIAGRAMS_TEAMS_NOTIFICATION_WEBHOOK }}
      GITHUB_REPOSITORY_NAME: ${{ github.repository }}
      GITHUB_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      WORKFLOW_NAME: ${{ github.workflow }}
      JOB_STATUS: ${{ needs.process-drawio-files.outputs.job_status }}
      PROCESSED_COUNT: ${{ needs.process-drawio-files.outputs.processed_count }}
      FAILED_COUNT: ${{ needs.process-drawio-files.outputs.failed_count }}
      PROCESSED_FILES_LIST: ${{ needs.process-drawio-files.outputs.processed_files_list }}
      UPLOAD_STATUS: ${{ needs.process-drawio-files.outputs.upload_final_status }}
      # Global env DIAGRAMS_TEAMS_NOTIFICATION_TITLE is directly available to scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set script permissions
        run: chmod +x ./scripts/*.sh

      - name: Get Commit Info
        id: commit_info
        run: |
          echo "author_name=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          echo "commit_sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Send Notification based on Status
        env:
          # These are explicitly passed to the script environment
          AUTHOR_NAME: ${{ steps.commit_info.outputs.author_name }}
          COMMIT_MESSAGE: ${{ steps.commit_info.outputs.commit_message }}
          COMMIT_SHA_SHORT: ${{ steps.commit_info.outputs.commit_sha_short }}
          # Other variables like JOB_STATUS, UPLOAD_STATUS, DIAGRAMS_TEAMS_WEBHOOK_URL, 
          # and DIAGRAMS_TEAMS_NOTIFICATION_TITLE are inherited from job or global env.
        run: |
          echo "Job status from previous job: $JOB_STATUS"
          echo "Final Upload status: $UPLOAD_STATUS"
          echo "Notification Title (from global env): $DIAGRAMS_TEAMS_NOTIFICATION_TITLE"
          echo "Webhook URL (from job env using vars): $DIAGRAMS_TEAMS_WEBHOOK_URL"

          if [ -z "$DIAGRAMS_TEAMS_WEBHOOK_URL" ]; then
            echo "::warning::Teams webhook URL is not set in the environment. Cannot send notification."
            exit 0 # Exit gracefully, no notification to send
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            ./scripts/success_notification.sh "$DIAGRAMS_TEAMS_WEBHOOK_URL" "$GITHUB_REPOSITORY_NAME" "$COMMIT_SHA_SHORT" "$WORKFLOW_NAME" "$GITHUB_RUN_ID"
          else
            # Capture error information from recent logs for the failure notification
            ERROR_SNIPPET=""
            if [ -f "$GITHUB_STEP_SUMMARY" ]; then
              ERROR_SNIPPET=$(tail -n 20 $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not read step summary")
            else
              ERROR_SNIPPET="No detailed error information available. Check the workflow logs."
            fi
            
            # Pass the error information to the failure notification script
            ./scripts/failure_notification.sh "$DIAGRAMS_TEAMS_WEBHOOK_URL" "$GITHUB_REPOSITORY_NAME" "$COMMIT_SHA_SHORT" "$WORKFLOW_NAME" "$GITHUB_RUN_ID" "$ERROR_SNIPPET"
          fi
